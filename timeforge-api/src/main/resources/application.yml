spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: ${SPRING_MAIL_HOST:}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

app:
  frontend-url: ${APP_FRONTEND_URL:http://localhost:9000}

password-reset:
  token:
    expiration-minutes: ${PASSWORD_RESET_TOKEN_EXPIRATION_MINUTES:30}

server:
  port: ${SERVER_PORT:8080}

security:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:9000}
  jwt:
    secret: ${JWT_SECRET}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
  admin:
    nome: ${ADMIN_NOME:Administrador}
    email: ${ADMIN_EMAIL}
    senha: ${ADMIN_PASSWORD}
