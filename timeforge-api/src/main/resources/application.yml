spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: ${SERVER_PORT:8080}

logging:
  file:
    name: ${LOG_FILE_PATH:logs/timeforge-api.log}
  level:
    root: INFO
    br.com.timeforge.timeforge_api: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{requestId:-sem-request-id}] [%thread] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{requestId:-sem-request-id}] [%thread] %logger{36} - %msg%n"

security:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:9000}
  jwt:
    secret: ${JWT_SECRET}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
  admin:
    nome: ${ADMIN_NOME:Administrador}
    email: ${ADMIN_EMAIL}
    senha: ${ADMIN_PASSWORD}
